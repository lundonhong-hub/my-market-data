name: Market Data Dashboard

on:
  schedule:
    # KST = UTC+9, so UTC 시간으로 변환
    - cron: '50 21 * * *'  # 06:50 KST
    - cron: '50 22 * * *'  # 07:50 KST
    - cron: '50 23 * * *'  # 08:50 KST
    - cron: '50 0 * * *'   # 09:50 KST
    - cron: '50 1 * * *'   # 10:50 KST
    - cron: '50 2 * * *'   # 11:50 KST
    - cron: '50 3 * * *'   # 12:50 KST
    - cron: '50 4 * * *'   # 13:50 KST
    - cron: '50 5 * * *'   # 14:50 KST
    - cron: '50 6 * * *'   # 15:50 KST
    - cron: '50 7 * * *'   # 16:50 KST
    - cron: '50 8 * * *'   # 17:50 KST
    - cron: '50 9 * * *'   # 18:50 KST
    - cron: '50 10 * * *'  # 19:50 KST
    - cron: '50 11 * * *'  # 20:50 KST
    - cron: '50 12 * * *'  # 21:50 KST
    - cron: '50 13 * * *'  # 22:50 KST
    - cron: '50 14 * * *'  # 23:50 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests yfinance

      - name: Run data_generate.py
        run: python data_generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "data update: $(date +'%Y-%m-%d %H:%M') KST"
          git pull --rebase
          git push
